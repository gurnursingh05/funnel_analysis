<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">E-commerce funnel overview</title>
  <desc id="desc">Funnel chart showing 4291 page views, 1338 add to carts, 954 checkout starts, 770 payment info submissions, and 709 purchases.</desc>
  <rect width="1000" height="560" fill="#fbfaf8"/>
  <text x="70" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#24313d">E-commerce Funnel Overview</text>
  <text x="70" y="94" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#637083">Distinct users by funnel stage, latest 30-day window ending 2026-02-03</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="135" width="860" height="66" rx="8" fill="#2f6f73"/>
    <text x="92" y="176" font-size="19" font-weight="700" fill="#ffffff">Page View</text>
    <text x="875" y="176" text-anchor="end" font-size="22" font-weight="700" fill="#ffffff">4,291</text>

    <rect x="70" y="220" width="268" height="66" rx="8" fill="#d98b3a"/>
    <text x="92" y="261" font-size="19" font-weight="700" fill="#ffffff">Add to Cart</text>
    <text x="875" y="261" text-anchor="end" font-size="22" font-weight="700" fill="#24313d">1,338</text>
    <line x1="358" y1="253" x2="850" y2="253" stroke="#d6d1ca" stroke-width="2" stroke-dasharray="6 7"/>
    <text x="875" y="264" font-size="14" fill="#637083">31%</text>

    <rect x="70" y="305" width="191" height="66" rx="8" fill="#466fb0"/>
    <text x="92" y="346" font-size="19" font-weight="700" fill="#ffffff">Checkout Start</text>
    <text x="875" y="346" text-anchor="end" font-size="22" font-weight="700" fill="#24313d">954</text>
    <line x1="281" y1="338" x2="850" y2="338" stroke="#d6d1ca" stroke-width="2" stroke-dasharray="6 7"/>
    <text x="875" y="349" font-size="14" fill="#637083">22%</text>

    <rect x="70" y="390" width="154" height="66" rx="8" fill="#9c5f8f"/>
    <text x="92" y="431" font-size="19" font-weight="700" fill="#ffffff">Payment Info</text>
    <text x="875" y="431" text-anchor="end" font-size="22" font-weight="700" fill="#24313d">770</text>
    <line x1="244" y1="423" x2="850" y2="423" stroke="#d6d1ca" stroke-width="2" stroke-dasharray="6 7"/>
    <text x="875" y="434" font-size="14" fill="#637083">18%</text>

    <rect x="70" y="475" width="142" height="50" rx="8" fill="#5f8f4e"/>
    <text x="92" y="506" font-size="18" font-weight="700" fill="#ffffff">Purchase</text>
    <text x="875" y="506" text-anchor="end" font-size="22" font-weight="700" fill="#24313d">709</text>
    <line x1="232" y1="500" x2="850" y2="500" stroke="#d6d1ca" stroke-width="2" stroke-dasharray="6 7"/>
    <text x="875" y="511" font-size="14" fill="#637083">16%</text>
  </g>
</svg>
